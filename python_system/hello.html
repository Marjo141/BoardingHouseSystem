<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Document</title>
</head>
<body>
    <!-- Login Form -->
    <form id="login-form" action="">
        <h1>Boarding House System</h1>
        <label for="login-username">Username</label>
        <input type="text" id="login-username" name="username" required>

        <label for="login-password">Password</label>
        <input type="password" id="login-password" name="password" required>

        <input type="submit" value="Login">
        <p class="form-toggle">Don't have an account? <a href="#" id="show-signup">Sign Up</a></p>
        <p class="form-toggle">Admin? <a href="#" id="show-admin-login">Admin Login</a></p>
    </form>

    <!-- Admin Login Form -->
    <form id="admin-login-form" action="" style="display: none;">
        <h1>🔐 Admin Login</h1>
        <label for="admin-username">Admin Username</label>
        <input type="text" id="admin-username" name="username" required>

        <label for="admin-password">Admin Password</label>
        <input type="password" id="admin-password" name="password" required>

        <input type="submit" value="Login as Admin">
        <p class="form-toggle"><a href="#" id="show-user-login">Back to User Login</a></p>
    </form>

    <!-- Signup Form -->
    <form id="signup-form" action="" style="display: none;">
        <h1>Create Account</h1>
        <label for="signup-fullname">Full Name</label>
        <input type="text" id="signup-fullname" name="fullname" required>

        <label for="signup-email">Email</label>
        <input type="email" id="signup-email" name="email" required>

        <label for="signup-username">Username</label>
        <input type="text" id="signup-username" name="username" required>

        <label for="signup-password">Password</label>
        <input type="password" id="signup-password" name="password" required>

        <label for="signup-confirm-password">Confirm Password</label>
        <input type="password" id="signup-confirm-password" name="confirm-password" required>

        <input type="submit" value="Create Account">
        <p class="form-toggle">Already have an account? <a href="#" id="show-login">Login</a></p>
    </form>
    <script src="script.js"></script>
</body>
</html>
